<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ===== SEO Meta Tags ===== -->
  <title>환율 예측 서비스 - AI 기반 환율 변동 예측</title>
  <meta name="description" content="AI 기술을 활용한 정확한 환율 예측 서비스. USD, EUR, JPY 등 주요 통화의 실시간 환율 조회 및 7일 후 예측 환율을 제공합니다." />
  <meta name="keywords" content="환율, 환율 예측, 환율 계산기, 달러 환율, 환율 추이, AI 예측" />
  <meta name="author" content="BI Kit Team" />

  <!-- Open Graph (소셜 미디어 공유) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="환율 예측 서비스 - AI 기반 환율 변동 예측" />
  <meta property="og:description" content="AI 기술을 활용한 정확한 환율 예측 서비스. 실시간 환율 조회와 7일 예측을 제공합니다." />
  <meta property="og:locale" content="ko_KR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="환율 예측 서비스" />
  <meta name="twitter:description" content="AI 기반 환율 예측으로 스마트한 외화 거래를 시작하세요." />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://example.com" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold'>💱</text></svg>" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="header" role="banner">
    <div class="container">
      <h1 class="logo">💱 환율 예측</h1>
      <p class="header-sub">AI 기반 환율 예측 서비스</p>
    </div>
  </header>

  <main class="container" role="main">

    <!-- 통화 선택 탭 -->
    <div class="tabs" id="currency-tabs" role="tablist">
      <button class="tab active" data-currency="USD" role="tab" aria-selected="true" aria-controls="rate-panel">🇺🇸 USD</button>
      <button class="tab" data-currency="EUR" role="tab" aria-selected="false" aria-controls="rate-panel">🇪🇺 EUR</button>
      <button class="tab" data-currency="JPY" role="tab" aria-selected="false" aria-controls="rate-panel">🇯🇵 JPY</button>
    </div>

    <!-- 현재 환율 카드 -->
    <section class="section" aria-labelledby="rate-heading">
      <h2 class="section-title" id="rate-heading">오늘의 환율</h2>
      <div id="rate-card-wrap" role="region" aria-live="polite"></div>
    </section>

    <!-- 환율 계산기 -->
    <section class="section" aria-labelledby="calc-heading">
      <h2 class="section-title" id="calc-heading">환율 계산기</h2>
      <div class="calculator-card">
        <div class="calc-row">
          <div class="calc-field">
            <label class="calc-label" for="calc-input" id="calc-base-label">USD 금액</label>
            <input class="calc-input" type="number" id="calc-input" placeholder="100" value="100" aria-describedby="calc-desc" />
            <div id="calc-desc" style="font-size:12px;color:#64748b;margin-top:4px;">원하는 금액을 입력하면 자동으로 계산됩니다</div>
          </div>
          <div class="calc-arrow">→</div>
          <div class="calc-field">
            <label class="calc-label" for="calc-result">KRW 환산</label>
            <div class="calc-result" id="calc-result" role="status" aria-live="polite">132,050 원</div>
          </div>
        </div>
      </div>
    </section>

    <!-- AI 예측 -->
    <section class="section" aria-labelledby="pred-heading">
      <h2 class="section-title" id="pred-heading">AI 예측</h2>
      <div class="prediction-card" id="prediction-card" role="region" aria-live="polite"></div>
    </section>

    <!-- 환율 추이 -->
    <section class="section" aria-labelledby="chart-heading">
      <h2 class="section-title" id="chart-title" id="chart-heading">최근 7일 환율 추이 (USD/KRW)</h2>
      <div class="chart-wrap">
        <canvas id="chart" role="img" aria-label="최근 7일 환율 추이 차트"></canvas>
      </div>
    </section>

  </main>

  <!-- 구조화된 데이터 (Schema.org) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "환율 예측 서비스",
    "description": "AI 기술을 활용한 정확한 환율 예측 서비스",
    "url": "https://example.com",
    "applicationCategory": "FinanceApplication",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "KRW"
    }
  }
  </script>

  <footer class="footer" role="contentinfo">
    <p>※ 예측은 참고용이며 실제 환율과 다를 수 있습니다.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
